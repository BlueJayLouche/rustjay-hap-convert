name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FFMPEG_VERSION: "7.1"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: rustjay-hap-convert-macos-arm64
            binary: rustjay-hap-convert
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: rustjay-hap-convert-macos-x86_64
            binary: rustjay-hap-convert
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: rustjay-hap-convert-linux-x86_64
            binary: rustjay-hap-convert
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: rustjay-hap-convert-windows-x86_64
            binary: rustjay-hap-convert.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # --- Bundle ffmpeg ---

      - name: Download ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg
          cp "$(which ffmpeg)" ffmpeg
          cp "$(which ffprobe)" ffprobe

      - name: Download ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L -o ffmpeg-release.tar.xz \
            "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          tar xf ffmpeg-release.tar.xz --wildcards '*/ffmpeg' '*/ffprobe' --strip-components=1

      - name: Download ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -L -o ffmpeg.zip `
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-extract
          Copy-Item ffmpeg-extract/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe .
          Copy-Item ffmpeg-extract/ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe .
        shell: pwsh

      # --- Package ---

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp ffmpeg ffprobe dist/
          chmod +x dist/ffmpeg dist/ffprobe
          cd dist
          tar czf ../${{ matrix.asset }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\${{ matrix.binary }} dist\
          copy ffmpeg.exe dist\
          copy ffprobe.exe dist\
          cd dist
          Compress-Archive -Path * -DestinationPath ..\${{ matrix.asset }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
